server:
  port: 8080
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: application/json,application/xml,text/html,text/plain,text/css,application/javascript

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/brainbook}
    username: ${SPRING_DATASOURCE_USERNAME:brainbook}
    password: ${SPRING_DATASOURCE_PASSWORD:brainbook}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 10000
      leak-detection-threshold: 30000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  mvc:
    async:
      request-timeout: ${SPRING_MVC_ASYNC_TIMEOUT:600000}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  bucket: ${MINIO_BUCKET:brainbook-attachments}
  access-key: ${MINIO_ACCESS_KEY:brainbook}
  secret-key: ${MINIO_SECRET_KEY:brainbook123}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

intelligence:
  base-url: ${INTELLIGENCE_BASE_URL:http://localhost:8001}
  timeout-seconds: ${INTELLIGENCE_TIMEOUT:600}

app:
  neuron:
    snapshot:
      idle-minutes: 60

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

logging:
  level:
    com.wliant.brainbook: DEBUG
