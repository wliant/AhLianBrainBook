server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/brainbook}
    username: ${SPRING_DATASOURCE_USERNAME:brainbook}
    password: ${SPRING_DATASOURCE_PASSWORD:brainbook}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  bucket: ${MINIO_BUCKET:brainbook-attachments}
  access-key: ${MINIO_ACCESS_KEY:brainbook}
  secret-key: ${MINIO_SECRET_KEY:brainbook123}

logging:
  level:
    com.wliant.brainbook: DEBUG
