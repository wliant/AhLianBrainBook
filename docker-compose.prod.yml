services:
  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: brainbook-app
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:?SPRING_DATASOURCE_URL is required}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:?SPRING_DATASOURCE_USERNAME is required}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?SPRING_DATASOURCE_PASSWORD is required}
      SPRING_FLYWAY_ENABLED: "true"
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:?MINIO_ENDPOINT is required}
      MINIO_BUCKET: ${MINIO_BUCKET:-brainbook-attachments}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      INTELLIGENCE_BASE_URL: ${INTELLIGENCE_BASE_URL:-http://intelligence-service:8001}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}
      SANDBOX_SERVICE_HOST: sandbox-service:50051
      TZ: UTC
    depends_on:
      sandbox-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  intelligence-service:
    build: ./intelligence-service
    container_name: brainbook-intelligence
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${INTELLIGENCE_PORT:-8001}:8001"
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:?OLLAMA_BASE_URL is required}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-deepseek-r1:32b}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      EMBEDDING_OLLAMA_BASE_URL: ${EMBEDDING_OLLAMA_BASE_URL:-${OLLAMA_BASE_URL}}
      EMBEDDING_OLLAMA_MODEL: ${EMBEDDING_OLLAMA_MODEL:-nomic-embed-text}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-4096}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  sandbox-service:
    build:
      context: .
      dockerfile: sandbox-service/Dockerfile
    container_name: brainbook-sandbox
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: ${SANDBOX_DATABASE_URL:?SANDBOX_DATABASE_URL is required}
      SANDBOX_ROOT_PATH: /data/sandboxes
      SANDBOX_MAX_REPO_SIZE_MB: ${SANDBOX_MAX_REPO_SIZE_MB:-1000}
      SANDBOX_MAX_TOTAL_DISK_MB: ${SANDBOX_MAX_TOTAL_DISK_MB:-5120}
      SANDBOX_CLONE_TIMEOUT_SEC: ${SANDBOX_CLONE_TIMEOUT_SEC:-300}
      SANDBOX_MAX_CONCURRENT_CLONES: ${SANDBOX_MAX_CONCURRENT_CLONES:-2}
      SANDBOX_MAX_COUNT: ${SANDBOX_MAX_COUNT:-10}
      SANDBOX_STALE_DAYS: ${SANDBOX_STALE_DAYS:-30}
      GITHUB_PAT: ${GITHUB_PAT:-}
      GRPC_PORT: 50051
      TZ: UTC
    volumes:
      - sandbox-data:/data/sandboxes
    healthcheck:
      test: ["CMD", "/app/grpc_health_probe", "-addr=:50051"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    container_name: brainbook-web
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  sandbox-data:
