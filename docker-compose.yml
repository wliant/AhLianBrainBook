version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: brainbook-db
    environment:
      POSTGRES_DB: brainbook
      POSTGRES_USER: brainbook
      POSTGRES_PASSWORD: brainbook
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brainbook"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: brainbook-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/brainbook
      SPRING_DATASOURCE_USERNAME: brainbook
      SPRING_DATASOURCE_PASSWORD: brainbook
      SPRING_FLYWAY_ENABLED: "true"
      ATTACHMENT_STORAGE_PATH: /data/attachments
    volumes:
      - attachments:/data/attachments
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: brainbook-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - backend

volumes:
  pgdata:
  attachments:
