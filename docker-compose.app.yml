services:
  app:
    build: ./app
    container_name: brainbook-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/brainbook
      SPRING_DATASOURCE_USERNAME: brainbook
      SPRING_DATASOURCE_PASSWORD: brainbook
      SPRING_FLYWAY_ENABLED: "true"
      MINIO_ENDPOINT: http://minio:9000
      MINIO_BUCKET: brainbook-attachments
      MINIO_ACCESS_KEY: brainbook
      MINIO_SECRET_KEY: brainbook123
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  web:
    build: ./web
    container_name: brainbook-web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
