services:
  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-brainbook}-app
    ports:
      - "${APP_PORT:-18080}:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/brainbook
      SPRING_DATASOURCE_USERNAME: brainbook
      SPRING_DATASOURCE_PASSWORD: brainbook
      SPRING_FLYWAY_ENABLED: "true"
      MINIO_ENDPOINT: http://minio:9000
      MINIO_BUCKET: brainbook-attachments
      MINIO_ACCESS_KEY: brainbook
      MINIO_SECRET_KEY: brainbook123
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:13000}
      INTELLIGENCE_BASE_URL: http://intelligence-service:8001
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}
      SANDBOX_SERVICE_HOST: sandbox-service:50051
      TZ: UTC
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      sandbox-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  sandbox-service:
    build:
      context: .
      dockerfile: sandbox-service/Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-brainbook}-sandbox
    environment:
      DATABASE_URL: postgres://sandbox:sandbox@postgres:5432/sandbox?sslmode=disable
      SANDBOX_ROOT_PATH: /data/sandboxes
      SANDBOX_MAX_REPO_SIZE_MB: ${SANDBOX_MAX_REPO_SIZE_MB:-1000}
      SANDBOX_MAX_TOTAL_DISK_MB: ${SANDBOX_MAX_TOTAL_DISK_MB:-5120}
      SANDBOX_CLONE_TIMEOUT_SEC: ${SANDBOX_CLONE_TIMEOUT_SEC:-300}
      SANDBOX_MAX_CONCURRENT_CLONES: ${SANDBOX_MAX_CONCURRENT_CLONES:-2}
      SANDBOX_MAX_COUNT: ${SANDBOX_MAX_COUNT:-10}
      SANDBOX_STALE_DAYS: ${SANDBOX_STALE_DAYS:-30}
      GITHUB_PAT: ${GITHUB_PAT:-}
      GRPC_PORT: 50051
      TZ: UTC
    volumes:
      - sandbox-data:/data/sandboxes
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/grpc_health_probe", "-addr=:50051"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  intelligence-service:
    build: ./intelligence-service
    container_name: ${COMPOSE_PROJECT_NAME:-brainbook}-intelligence
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${INTELLIGENCE_PORT:-18001}:8001"
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-deepseek-r1:32b}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      EMBEDDING_OLLAMA_BASE_URL: ${EMBEDDING_OLLAMA_BASE_URL:-${OLLAMA_BASE_URL:-http://host.docker.internal:11434}}
      EMBEDDING_OLLAMA_MODEL: ${EMBEDDING_OLLAMA_MODEL:-nomic-embed-text}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-4096}
      TEMPERATURE_GOAL_GENERATOR: ${TEMPERATURE_GOAL_GENERATOR:-0.7}
      TEMPERATURE_TOPIC_GENERATOR: ${TEMPERATURE_TOPIC_GENERATOR:-0.4}
      TEMPERATURE_TOPIC_SCORER: ${TEMPERATURE_TOPIC_SCORER:-0.1}
      TEMPERATURE_BULLET_EXPANDER: ${TEMPERATURE_BULLET_EXPANDER:-0.4}
      MAX_TOKENS_GOAL_GENERATOR: ${MAX_TOKENS_GOAL_GENERATOR:-256}
      MAX_TOKENS_TOPIC_GENERATOR: ${MAX_TOKENS_TOPIC_GENERATOR:-4096}
      MAX_TOKENS_TOPIC_SCORER: ${MAX_TOKENS_TOPIC_SCORER:-4096}
      MAX_TOKENS_BULLET_EXPANDER: ${MAX_TOKENS_BULLET_EXPANDER:-2048}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:18080}
    container_name: ${COMPOSE_PROJECT_NAME:-brainbook}-web
    ports:
      - "${WEB_PORT:-13000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:18080}
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  sandbox-data:
