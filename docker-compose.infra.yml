services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ${COMPOSE_PROJECT_NAME:-brainbook}-db
    environment:
      POSTGRES_DB: brainbook
      POSTGRES_USER: brainbook
      POSTGRES_PASSWORD: brainbook
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brainbook"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: ${COMPOSE_PROJECT_NAME:-brainbook}-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: brainbook
      MINIO_ROOT_PASSWORD: brainbook123
    ports:
      - "${MINIO_API_PORT:-19000}:9000"
      - "${MINIO_CONSOLE_PORT:-19001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  minio-data:
