name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        working-directory: app
        run: ./gradlew test

  frontend:
    name: Frontend Tests & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Run tests
        working-directory: web
        run: npm test

      - name: Build
        working-directory: web
        run: npm run build

  intelligence-service:
    name: Intelligence Service Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        working-directory: intelligence-service
        run: uv sync --dev

      - name: Run tests
        working-directory: intelligence-service
        run: uv run pytest --tb=short -v

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Start infrastructure
        run: docker compose -f docker-compose.infra.yml up -d --wait

      - name: Build and start application
        run: docker compose -f docker-compose.infra.yml -f docker-compose.app.yml up -d --build --wait

      - uses: astral-sh/setup-uv@v4

      - name: Install E2E dependencies
        working-directory: e2e-test
        run: |
          uv sync
          uv run playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: e2e-test
        env:
          BASE_URL: http://localhost:13000
          API_URL: http://localhost:18080
          MINIO_ENDPOINT: localhost:19000
          MINIO_ACCESS_KEY: brainbook
          MINIO_SECRET_KEY: brainbook123
          MINIO_BUCKET: brainbook-attachments
          MINIO_SECURE: "false"
        run: uv run pytest --tb=short -v

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: e2e-test/test-results/

      - name: Stop services
        if: always()
        run: |
          docker compose -f docker-compose.infra.yml -f docker-compose.app.yml down -v
